<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O Jogo das Vogais - Pré 1</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: linear-gradient(135deg, #fffae6 0%, #eef9ff 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .game-card { background: white; border-radius: 32px; box-shadow: 0 16px 32px rgba(0, 0, 0, 0.08); width: 100%; max-width: 500px; padding: 30px; text-align: center; border: 6px solid #ffdf7e; position: relative; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .stars-container { font-size: 1.5rem; font-weight: bold; color: #ffa100; background: #fff5d6; padding: 8px 16px; border-radius: 20px; display: flex; align-items: center; gap: 5px; }
        .progress-dots { display: flex; gap: 8px; }
        .dot { width: 14px; height: 14px; border-radius: 50%; background-color: #e0e0e0; }
        .dot.active { background-color: #4caf50; transform: scale(1.2); }
        .dot.completed { background-color: #ffca28; }
        .instruction { font-size: 1.3rem; color: #4a4a4a; margin-bottom: 20px; font-weight: 700; }
        .visual-container { background-color: #f7f9fc; border-radius: 24px; padding: 40px 20px; margin-bottom: 30px; border: 3px dashed #cbd5e1; }
        .main-emoji { font-size: 7rem; display: block; margin-bottom: 10px; }
        .word-hint { font-size: 2rem; font-weight: 800; color: #2c3e50; letter-spacing: 2px; text-transform: uppercase; }
        .word-hint span { color: #ff4a4a; border-bottom: 4px solid #ff4a4a; padding: 0 4px; display: inline-block; min-width: 25px; }
        .options-container { display: flex; justify-content: center; gap: 20px; margin-bottom: 10px; }
        .btn-option { background-color: white; border: 4px solid #e2e8f0; border-bottom: 10px solid #e2e8f0; border-radius: 24px; width: 100px; height: 100px; font-size: 3.5rem; font-weight: 900; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        .btn-option:active { transform: translateY(6px); border-bottom-width: 4px; }
        .btn-option.color-0 { border-color: #ff6b6b; border-bottom-color: #e64a4a; color: #ff6b6b; }
        .btn-option.color-1 { border-color: #4dadf7; border-bottom-color: #339af0; color: #4dadf7; }
        .feedback-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(255, 255, 255, 0.95); border-radius: 26px; display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; z-index: 10; }
        .feedback-overlay.show { opacity: 1; pointer-events: auto; }
        .feedback-emoji { font-size: 6rem; margin-bottom: 15px; }
        .feedback-text { font-size: 1.8rem; font-weight: 800; margin-bottom: 20px; }
        .feedback-success .feedback-text { color: #2b8a3e; }
        .feedback-try-again .feedback-text { color: #ff922b; }
        .btn-next { background-color: #4caf50; color: white; border: none; border-bottom: 6px solid #388e3c; padding: 15px 40px; font-size: 1.5rem; font-weight: bold; border-radius: 20px; cursor: pointer; }
        .screen { display: none; }
        .screen.active { display: block; }
        .final-trophy { font-size: 8rem; margin: 20px 0; display: inline-block; }
        .final-title { font-size: 2.2rem; color: #ff9100; margin-bottom: 10px; font-weight: 900; }
        .final-subtitle { font-size: 1.2rem; color: #64748b; margin-bottom: 30px; font-weight: 600; }
        .btn-restart { background-color: #ff9800; color: white; border: none; border-bottom: 6px solid #f57c00; padding: 15px 40px; font-size: 1.5rem; font-weight: bold; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="game-card">
        <div id="game-screen" class="screen active">
            <div class="top-bar">
                <div class="stars-container"><span>⭐</span> <span id="star-count">0</span></div>
                <div class="progress-dots" id="dots-container"></div>
            </div>
            <div class="instruction">Com qual letra começa?</div>
            <div class="visual-container">
                <span class="main-emoji" id="current-emoji">✈️</span>
                <div class="word-hint" id="word-text"><span>_</span>VIÃO</div>
            </div>
            <div class="options-container" id="options-box"></div>
            <div class="feedback-overlay" id="feedback-zone">
                <div class="feedback-emoji" id="feedback-icon">🎉</div>
                <div class="feedback-text" id="feedback-message">Muito bem!</div>
                <button class="btn-next" id="btn-next-step" onclick="advance()">Avançar 🚀</button>
            </div>
        </div>
        <div id="end-screen" class="screen">
            <div class="final-trophy">🏆</div>
            <div class="final-title">Parabéns!</div>
            <div class="final-subtitle">Você encontrou as vogais! 🎉🌟</div>
            <div class="stars-container" style="margin: 0 auto 30px auto; width: max-content;">
                <span>Ganhou ⭐ x </span> <span id="final-star-count">4</span>
            </div>
            <button class="btn-restart" onclick="restartGame()">Jogar de Novo 🔄</button>
        </div>
    </div>
    <script>
        const questions = [
            { emoji: '✈️', name: 'AVIÃO', hint: '<span>_</span>VIÃO', options: ['A', 'E'], correct: 'A' },
            { emoji: '🐘', name: 'ELEFANTE', hint: '<span>_</span>LEFANTE', options: ['O', 'E'], correct: 'E' },
            { emoji: '🥚', name: 'OVO', hint: '<span>_</span>VO', options: ['O', 'U'], correct: 'O' },
            { emoji: '🐻', name: 'URSO', hint: '<span>_</span>RSO', options: ['A', 'U'], correct: 'U' }
        ];
        let currentIndex = 0, stars = 0;
        function initGame() {
            currentIndex = 0; stars = 0;
            document.getElementById('star-count').innerText = stars;
            const container = document.getElementById('dots-container');
            container.innerHTML = '';
            questions.forEach((_, i) => {
                const dot = document.createElement('div');
                dot.className = 'dot' + (i === 0 ? ' active' : '');
                container.appendChild(dot);
            });
            showQuestion();
        }
        function showQuestion() {
            document.getElementById('feedback-zone').className = 'feedback-overlay';
            const q = questions[currentIndex];
            document.getElementById('current-emoji').innerText = q.emoji;
            document.getElementById('word-text').innerHTML = q.hint;
            document.querySelectorAll('.dot').forEach((dot, i) => {
                dot.className = 'dot';
                if (i < currentIndex) dot.classList.add('completed');
                if (i === currentIndex) dot.classList.add('active');
            });
            const box = document.getElementById('options-box');
            box.innerHTML = '';
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = btn-option color-${i};
                btn.innerText = opt;
                btn.onclick = () => evaluateAnswer(opt);
                box.appendChild(btn);
            });
        }
        function evaluateAnswer(selected) {
            const q = questions[currentIndex], zone = document.getElementById('feedback-zone'), icon = document.getElementById('feedback-icon'), msg = document.getElementById('feedback-message'), btn = document.getElementById('btn-next-step');
            if (selected === q.correct) {
                stars++; document.getElementById('star-count').innerText = stars;
                zone.className = 'feedback-overlay show feedback-success';
                icon.innerText = '🎉'; msg.innerText = 'Você arrasou!';
                btn.innerText = 'Avançar 🚀'; btn.onclick = advance;
            } else {
                zone.className = 'feedback-overlay show feedback-try-again';
                icon.innerText = '✨'; msg.innerText = 'Quase lá! Tenta de novo?';
                btn.innerText = 'Tentar de Novo 💫';
                btn.onclick = () => { zone.className = 'feedback-overlay'; };
            }
        }
        function advance() {
            currentIndex++;
            if (currentIndex < questions.length) { showQuestion(); } 
            else {
                document.getElementById('game-screen').classList.remove('active');
                document.getElementById('end-screen').classList.add('active');
                document.getElementById('final-star-count').innerText = stars;
            }
        }
        function restartGame() {
            document.getElementById('end-screen').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');
            initGame();
        }
        window.onload = initGame;
    </script>
</body>
</html>
